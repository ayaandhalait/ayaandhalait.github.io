<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  .app-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 30px;
  }
  .app-item.left img {
    margin-right: 20px;
  }
  .app-item.right img {
    order: 2;
    margin-left: 20px;
  }
  .app-item h4 {
    margin: 0 0 5px 0;
  }
</style>
</head>
<body>

<nav>
  <div class="logo">Panthera Dhalait</div>
  <div class="right-items">
    <a href="/">Home</a>
    <a href="/articles/">Articles</a>
    <a href="/blogs/">Blogs</a>
    <a href="/store/">App Store</a>
  </div>
  <div class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<header>
  <h1>App Store</h1>
  <p>Here you can download things I make!</p>
</header>

<div class="particle" style="top:20%;left:10%;width:25px;height:25px"></div>
<div class="particle" style="top:50%;left:80%;width:20px;height:20px"></div>
<div class="particle" style="top:70%;left:30%;width:30px;height:30px"></div>

<section id="apps">
  <h2>Featured Apps</h2>

  <div class="about-text app-item left">
    <img src="/Icons/Digital_Lifeform.png" alt="Digital Life Form Icon" width="60" height="60">
    <div>
      <h4>Digital Life Form</h4>
      A Digital Text Based Living Being.<br>
      <a class="download-btn" href="/apps/Digital Lifeform.zip" download>Download</a>
    </div>
  </div>

  <div class="about-text app-item right">
    <img src="/Icons/Dalculator.png" alt="Velocity Notes Icon" width="60" height="60">
    <div>
      <h4>Dalculator</h4>
      A small Calculator made in Python.<br>
      <a class="download-btn" href="/apps/Dalculator.zip" download>Download</a>
    </div>
  </div>
</section>

<footer>
  © Ayaan Dhalait. A Computer Programmer
</footer>

<script>
  const hamburger = document.querySelector('.hamburger');
  const menu = document.querySelector('.right-items');

  hamburger.addEventListener('click', () => {
    menu.classList.toggle('active');
  });
</script>
</body>
</html>
